version: 2

project_name: relay

before:
  hooks:
    - go mod tidy
    - sh -c "cd dashboard && npm ci && npm run build"

builds:
  - id: relay
    main: ./cmd/relay
    binary: relay
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: relay-archive
    builds:
      - relay
    files:
      - README.md
      - config/example.yaml

dockers:
  - ids:
      - relay
    image_templates:
      - "algoryn/relay:{{ .Version }}"
      - "algoryn/relay:latest"

checksum:
  name_template: "checksums.txt"

# Software Bill of Materials for each archive (requires `syft` on the runner).
sboms:
  - id: archive
    artifacts: archive

# Keyless signing of the checksums file via cosign + Sigstore (Fulcio/Rekor).
# Works in CI with OIDC (e.g. GitHub Actions `id-token: write`); requires the
# `cosign` binary. Verify with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig checksums.txt
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

# Keyless signing of the published Docker image(s).
docker_signs:
  - cmd: cosign
    args:
      - sign
      - "--yes"
      - "${artifact}@${digest}"
    artifacts: images
    output: true
