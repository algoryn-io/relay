version: 2

project_name: relay

before:
  hooks:
    - go mod tidy
    - sh -c "cd dashboard && npm ci && npm run build"

builds:
  - id: relay
    main: ./cmd/relay
    binary: relay
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: relay-archive
    builds:
      - relay
    files:
      - README.md
      - config/example.yaml

dockers:
  - ids:
      - relay
    image_templates:
      - "algoryn/relay:{{ .Version }}"
      - "algoryn/relay:latest"

checksum:
  name_template: "checksums.txt"
